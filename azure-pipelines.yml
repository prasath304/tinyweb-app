trigger:
  branches:
    include:
      - master

pool:
  vmImage: 'ubuntu-latest'

steps:
# 1. Use Node.js (adjust version to match your Angular project)
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Use Node.js 20'

# 2. Install dependencies in the correct folder
- script: |
    npm install
  workingDirectory: tinyweb-app
  displayName: 'Install npm packages'

# 3. Build Angular app
- script: |
    npm run build  --configuration production
  workingDirectory: tinyweb-app
  displayName: 'Build Angular app'

# 4. Publish build artifacts
- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: 'tinyweb-app/dist/tinyweb-app/browser'
    artifactName: 'drop'
    publishLocation: 'Container'
  displayName: 'Publish build artifacts'