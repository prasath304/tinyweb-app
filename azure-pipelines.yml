# azure-pipelines.yml

trigger:
  branches:
    include:
      - main   # Run pipeline when code is pushed to main

pool:
  vmImage: 'ubuntu-latest'   # Use Linux agent for Angular builds
  # name: tinyweb-apppool


variables:
  node_version: '20.x'
  buildConfiguration: 'production'
  angularProject: 'my-app'   # Replace with your Angular project name


stages:
  - stage: Build
    displayName: 'Build Angular App'
    jobs:
      - job: BuildAngular
        steps:
        
          - task: NodeTool@0
            inputs:
              versionSpec: $(node_version)
            displayName: 'Use Node.js $(node_version)'

          - script: npm install -g @angular/cli
            workingDirectory: tinyweb-app
            displayName: 'Install Angular CLI'

          - script: npm install
            workingDirectory: tinyweb-app
            displayName: 'Install dependencies'

          - script: npm run build-prod
            workingDirectory: tinyweb-app
            displayName: 'Build Angular app (production)'
         

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'tinyweb-app/dist/tinyweb-app/browser'
              ArtifactName: 'drop'
              publishLocation: 'Container'
       

  - stage: Deploy
    displayName: 'Deploy to Azure Web App'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployAngular
        steps:
        # Download the artifact published in Build stage
        - task: DownloadPipelineArtifact@2
          inputs:
            artifactName: 'drop'
            targetPath: '$(Pipeline.Workspace)/drop'

        - task: AzureWebApp@1
          inputs:
              azureSubscription: 'AzureSubscription-Prod'
              appName: 'tiny-webApp'
              appType: 'webApp'
              package: '$(Pipeline.Workspace)/drop'

            