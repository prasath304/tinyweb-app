trigger:
- main

variables:
  webAppName: 'tiny-webApp'
  environmentName: 'tiny-webApp'
  vmImageName: 'ubuntu-latest'

pool:
  vmImage: $(vmImageName)
  name: webapp-pool

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    npm install -g @angular/cli
    npm install
  displayName: 'npm install dependencies'
  workingDirectory: 'tinyweb-app'

- script: npm run build:ssr
  displayName: 'Build Angular SSR App'
  workingDirectory: 'tinyweb-app'


- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'tinyweb-app/dist/tinyweb-app/browser'
    ArtifactName: 'drop'
    publishLocation: 'Container'
  displayName: 'Publish build Artifacts'
