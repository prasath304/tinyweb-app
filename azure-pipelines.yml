# azure-pipelines.yml

trigger:
  branches:
    include:
      - main   # Run pipeline when code is pushed to main

pool:
  vmImage: 'ubuntu-latest'   # Use Linux agent for Angular builds
  # name: tinyweb-apppool


variables:
  buildConfiguration: 'production'

stages:
  - stage: Build
    displayName: 'Build Angular App'
    jobs:
      - job: BuildAngular
        steps:
        
          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'   # Install Node.js
            displayName: 'Install Node.js'

          - script: npm install -g @angular/cli
            workingDirectory: tinyweb-app
            displayName: 'Install Angular CLI'

          - script: npm install
            workingDirectory: tinyweb-app
            displayName: 'Install dependencies'

          - script: npm run build-prod
            workingDirectory: tinyweb-app
            displayName: 'Build Angular app (production)'
           # Prerender routes (Step 2)
          - script: npm run prerender
            workingDirectory: tinyweb-app
            displayName: 'Prerender Angular routes'

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'tinyweb-app/dist/tinyweb-app/browser'
              ArtifactName: 'drop'
              publishLocation: 'Container'
       

  - stage: Deploy
    displayName: 'Deploy to Azure Web App'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployAngular
        steps:
        # Download the artifact published in Build stage
        - task: DownloadPipelineArtifact@2
          inputs:
            artifactName: 'drop'
            targetPath: '$(Pipeline.Workspace)/drop'

        - task: AzureWebApp@1
          inputs:
              azureSubscription: 'AzureSubscription-Prod'
              appName: 'tiny-webApp'
              appType: 'webApp'
              package: '$(Pipeline.Workspace)/drop'

            